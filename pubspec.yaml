name: snaptrack
description: AI-powered meal calorie and protein tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP client (dart:io based, no extra deps)
  http: ^1.2.1

  # Image picker (camera + gallery)
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
